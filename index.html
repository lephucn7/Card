<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Happy Birthday 💖</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="card">
  <h1>🎂 Happy Birthday 🎂</h1>
  <div class="subtitle">Gửi đến người đặc biệt nhất hôm nay 💖</div>

  <!-- Film -->
  <div class="film-container hidden" id="film">
    <div class="film-strip">
      <img src="images/photo1.jpg" alt="Ký ức">
      <img src="images/photo2.jpg" alt="Ký ức">
      <img src="images/photo3.jpg" alt="Ký ức">
      <img src="images/photo4.jpg" alt="Ký ức">
      <img src="images/photo5.jpg" alt="Ký ức">
      <!-- Duplicate for seamless loop -->
      <img src="images/photo1.jpg" alt="Ký ức">
      <img src="images/photo2.jpg" alt="Ký ức">
      <img src="images/photo3.jpg" alt="Ký ức">
      <img src="images/photo4.jpg" alt="Ký ức">
      <img src="images/photo5.jpg" alt="Ký ức">
    </div>
  </div>

  <!-- Message -->
  <div class="message hidden" id="message">
    Chúc bạn luôn vui vẻ, hạnh phúc ✨<br><br>
    Mong rằng tuổi mới sẽ mang đến thật nhiều điều tuyệt vời 🎉<br><br>
    Cảm ơn vì đã xuất hiện trong cuộc đời này 💖
  </div>

  <button id="btn">Mở lời chúc ✨</button>
</div>

<div class="music">🎵 Happy Birthday</div>

<script src="js/stars.js"></script>
<script src="js/main.js"></script>
</body>
</html>
